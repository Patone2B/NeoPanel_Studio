        <p class="lead">Chaque module a un rôle précis : surveiller, contrôler, lancer, configurer ou diagnostiquer.</p>

        <div class="feature-grid">
          <article class="feature-card"><span class="icon">▣</span><h2>Dashboard système</h2><p>Affiche les informations essentielles du PC : CPU, RAM, disque, réseau, état général et indicateurs utiles. La partie GPU peut évoluer selon les données disponibles sous Windows.</p></article>
          <article class="feature-card"><span class="icon">▶</span><h2>Contrôle multimédia</h2><p>Contrôlez lecture, pause, volume, piste suivante, piste précédente et mute depuis le téléphone, même lorsque le PC est en plein écran.</p></article>

          <article class="feature-card"><span class="icon">☁</span><h2>Météo locale</h2><p>Affichez la météo de votre ville avec une clé OpenWeather. La météo reste séparée des fonctions principales pour garder une interface lisible.</p></article>
          <article class="feature-card"><span class="icon">✎</span><h2>Notes synchronisées</h2><p>Prenez des notes depuis l'interface mobile et gardez sous la main des pense-bêtes pour le montage vidéo, le streaming ou le travail quotidien.</p></article>

          <article class="feature-card"><span class="icon">⌕</span><h2>Diagnostic</h2><p>Consultez la version, l'adresse IP locale, l'état du serveur, la session active et les informations utiles avant de signaler un bug.</p></article>
          <article class="feature-card"><span class="icon">◫</span><h2>QR code de connexion</h2><p>Scannez le QR code affiché par le logiciel pour ouvrir rapidement l'interface sur votre smartphone ou votre tablette.</p></article>
