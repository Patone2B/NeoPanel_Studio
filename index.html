          </p>

          <div class="text-block">

            </p>

  <template id="page-fonctionnalites">
    <section class="page">
      <div class="container">
        <p class="eyebrow">Fonctionnalités</p>
        <h1>Une page, une fonction : chaque module a un rôle précis.</h1>
        <p class="lead">
          L'objectif est d'éviter une interface confuse. Chaque page doit servir à une action claire :
          surveiller, contrôler, lancer, configurer ou diagnostiquer.
        </p>

        <div class="feature-grid">
          <article class="feature-card">
            <span class="icon">▣</span>
            <h2>Dashboard système</h2>
            <p>
              Affiche les informations essentielles du PC : CPU, RAM, VRAM, disque, température,
              réseau et état général. Le GPU reste indiqué comme fonctionnalité à améliorer si Windows
              ne renvoie pas de donnée fiable.
            </p>
          </article>

          <article class="feature-card">
            <span class="icon">▶</span>
            <h2>Contrôle multimédia</h2>
            <p>
              Permet de contrôler la lecture, le volume, le mute, le morceau suivant et le morceau précédent
              depuis le téléphone. C'est utile quand le PC est loin, en plein écran ou utilisé en montage. 
            </p>
          </article>

          <article class="feature-card">
            <span class="icon">⌘</span>
            <h2>Pages personnalisées</h2>
            <p>
              Crée des pages dédiées à un logiciel avec un chemin d'accès et dix boutons configurables.
              Chaque bouton peut lancer une action ou envoyer un raccourci clavier défini par l'utilisateur. NeoDeck vous permet de créer vos propres pages de raccourcis logiciels, avec jusqu’à 10 boutons personnalisables.
            </p>
          </article>

          <article class="feature-card">
            <span class="icon">☁</span>
            <h2>Météo</h2>
            <p>
              Affiche la météo locale avec une ville et une clé API configurables. La météo reste séparée
              du reste du logiciel pour ne pas gêner les fonctions principales . Pour cela, munissez-vous d’une clé API gratuite OpenWeather et consultez la météo de votre ville en temps réel.
            </p>
          </article>

          <article class="feature-card">
            <span class="icon">⌕</span>
            <h2>Diagnostic</h2>
            <p>
              Donne des informations utiles en cas de problème : version, serveur, IP locale,
              session, état réseau et fonctions disponibles. C'est la page à consulter avant de chercher un bug.
            </p>
          </article>

          <article class="feature-card">
            <span class="icon">◎</span>
            <h2>Réseau local</h2>
            <p>
              Le téléphone ne se connecte pas à Internet pour accéder au dashboard : il rejoint l'adresse
              locale du PC. Le QR code renvoie donc vers l'adresse du PC qui lance le logiciel.
            </p>
          </article>
                 <article class="feature-card">
            <span class="icon">◎</span>
            <h2>Note </h2>
            <p>
          Enfin, NeoDeck intègre un éditeur de notes synchronisé, idéal pour prendre des notes sur votre portable directement dans l’application. Pratique pour le montage vidéo ou pour garder sous la main des pense-bêtes !
            </p>
          </article>
        </div>
      </div>
    </section>
  </template>

  <template id="page-apropos">
    <section class="page">
      <div class="container narrow">
        <p class="eyebrow">À propos</p>
        <h1>Un projet inspiré des anciens écrans de contrôle, adapté aux usages actuels.</h1>
        <p class="lead">
          NeoPanel_Studio reprend l'idée d'un petit écran secondaire utile : afficher l'état du PC,
          déclencher des actions rapides, contrôler la musique et centraliser des boutons importants.
        </p>

        <div class="text-block">
          <h2>À quoi ça sert concrètement ?</h2>
          <p>
            Le logiciel est pratique pour le montage vidéo, le streaming, le jeu, la bureautique ou simplement
            pour garder un œil sur le PC sans quitter une application en plein écran. Le téléphone devient une
            télécommande locale et personnalisable.
          </p>
        </div>

        <div class="text-block">
          <h2>Pourquoi une interface web ?</h2>
          <p>
            Une interface web locale permet d'utiliser presque n'importe quel smartphone sans installer
            d'application mobile dédiée. Le PC héberge la page, le téléphone l'affiche. Cela rend le projet
            plus simple à partager, à modifier et à faire évoluer.
          </p>
        </div>

        <div class="text-block">
          <h2>Contribuer</h2>
          <p>
            Les contributions peuvent porter sur les raccourcis, les thèmes, la compatibilité GPU,
            l'interface mobile, la documentation ou la création de profils pour les logiciels.
            Une contribution utile doit être testée, expliquée et ne pas casser les fonctions existantes.
          </p>
        </div>
      </div>
    </section>
